async function loadMonthBookings(monthIndex) {
  const year = 2025;
  const monthStr = String(monthIndex + 1).padStart(2, '0');
  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

  const startKey = `${year}-${monthStr}-01`;
  const endKey   = `${year}-${monthStr}-${String(daysInMonth).padStart(2, '0')}`;

  const bookings = {};

  const snapshot = await db.collection(calendarCol())
    .where(firebase.firestore.FieldPath.documentId(), ">=", startKey)
    .where(firebase.firestore.FieldPath.documentId(), "<=", endKey)
    .get();

  snapshot.forEach(doc => {
    bookings[doc.id] = doc.data();
  });

  renderMonth(monthIndex, bookings);
}

case 'morning': text = data[period].timePeriod ? `${data[period].timePeriod}` : ''; break;
case 'evening': text = data[period].timePeriod ? `${data[period].timePeriod}` : ''; break;

            case 'fullDay': text = 'كامل'; break;

if (hasOwnerSource) {

}

      });

    // حفظ المصروفات في فايرستور

      db.collection("expenses").doc(currentExpenseDocId).set({ items: expensesList })
        .then(() => renderExpenses())
        .catch(e => alert('خطأ في حفظ المصروفات: ' + e.message));
    }

    // تحميل بيانات المصروفات ونوعياتها
async function loadExpenses(month) {
  currentExpenseDocId = expensesDocId(month);
  expensesList = [];
  document.getElementById('expenseList').innerHTML = '';
  document.getElementById('expenseTypeInput').style.display = 'none';
  document.getElementById('expenseTypeSelect').style.display = 'block';

  showPopup('expensesPopup'); // 👈 أضف هذه هنا
  const allTypes = [...new Set([...expenseTypes])];

  try {
    const doc = await db.collection("expenses").doc(currentExpenseDocId).get();
    if (doc.exists) {
      expensesList = doc.data().items || [];
      expensesList.forEach(exp => {
        if (!allTypes.includes(exp.type)) allTypes.push(exp.type);
      });
    }
  } catch(e) {
    alert('خطأ في تحميل المصروفات: ' + e.message);
  }

  const select = document.getElementById('expenseTypeSelect');
  select.innerHTML = '<option value="" disabled selected>اختر نوع المصروف</option>';
  allTypes.forEach(type => {
    const opt = document.createElement('option');
    opt.value = type;
    opt.textContent = type;
    select.appendChild(opt);
  });

  renderExpenses();
}

let swiper = null;

function buildCalendar() {
  const monthsList = [
    'يناير 2025','فبراير 2025','مارس 2025','أبريل 2025','مايو 2025','يونيو 2025',
    'يوليو 2025','أغسطس 2025','سبتمبر 2025','أكتوبر 2025','نوفمبر 2025','ديسمبر 2025'
  ];
  const weekdays = ['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

  const today = new Date();
  const currentDay = today.getDate();
  const currentMonth = today.getMonth();
  const currentYear = today.getFullYear();
  const initialMonthIndex = currentYear === 2025 ? currentMonth : 0;

  const monthsContainer = document.getElementById('monthsContainer');
  // نظّف الشرائح
  monthsContainer.innerHTML = '';

  // أنشئ الشرائح من جديد
  monthsList.forEach((month, index) => {
    const slide = document.createElement('div');
    slide.className = 'swiper-slide';

    const daysInMonth = new Date(2025, index + 1, 0).getDate();
    const firstDay = new Date(2025, index, 1).getDay(); // 0=الأحد

    let calendarGrid = '';
    // فراغات قبل بداية الشهر
    for (let i = 0; i < firstDay; i++) {
      calendarGrid += `<div class="day empty"></div>`;
    }
    // الأيام
    for (let i = 1; i <= daysInMonth; i++) {
      const isToday = (index === currentMonth && currentYear === 2025 && i === currentDay);
      const dateKey = `2025-${String(index + 1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      calendarGrid += `
        <div class="day${isToday ? ' today' : ''}" data-date="${dateKey}">
          <div class="day-number">${i}</div>
        </div>
      `;
    }

    slide.innerHTML = `
      <div class="month-title">${month}</div>
      <div class="weekday-row">${weekdays.map(w => `<div>${w}</div>`).join('')}</div>
      <div class="calendar-grid">${calendarGrid}</div>
      <div class="month-buttons">
        <button onclick="openDashboard()">📊 لوحة التحكم</button>
        <button onclick="openExpenses('${String(index+1).padStart(2,'0')}')">💰 المصروفات</button>
        <button onclick="generateReport()">📊 التقرير</button>
      </div>
    `;
    monthsContainer.appendChild(slide);

    // تحميل حجوزات هذا الشهر من المجموعة الصحيحة حسب العقار
    for (let i = 1; i <= daysInMonth; i++) {
      const dateKey = `2025-${String(index + 1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      db.collection(calendarCol()).doc(dateKey).get().then(doc => {
        if (doc.exists) {
          const dayEl = slide.querySelector(`.day[data-date='${dateKey}']`);
          if (dayEl) renderBookings(dayEl, doc.data());
        }
      });
    }
  });

  // أعد تهيئة السوايبر
  if (swiper && swiper.destroy) {
    swiper.destroy(true, true);
  }
  swiper = new Swiper('.swiper', {
    slidesPerView: 'auto',
    centeredSlides: true,
    spaceBetween: 0,
    loop: true,
    effect: 'slide',
  });
  swiper.slideToLoop(initialMonthIndex, 0);
}

          const months = [];
          let current = new Date(start.getFullYear(), start.getMonth(), 1);
          const last = new Date(end.getFullYear(), end.getMonth(), 1);
          while (current <= last) {
            months.push(String(current.getMonth() + 1).padStart(2, '0'));

          }
          return months;

function scheduleThankYou(booking) {
  const now = new Date();
  const bookingDate = new Date(currentDateKey);
  let exitDate = new Date(bookingDate);

  const period = currentPeriod;
  if (!period || !booking[period]) return;

  if (period === 'morning' || period === 'evening') {
    const timeRange = booking[period].timePeriod || '08:00-14:00';
    const endTime = timeRange.split('-')[1].trim();
    const [endHour, endMinute] = endTime.split(':');
    exitDate.setHours(+endHour, +endMinute, 0, 0);
  } else if (period === 'fullDay') {
    exitDate.setHours(22, 0, 0, 0); // 10 مساء
  } else if (period === 'overnight') {
    exitDate.setDate(exitDate.getDate() + 1);
    exitDate.setHours(9, 0, 0, 0); // اليوم التالي 9 صباح
  }

  const msUntilExit = exitDate - now;

  if (msUntilExit <= 0) {
    showThankYou(booking[period].guestName);
  } else {

}

<script>

async function openDashboard() {

  showPopup('dashboardPopup');

  const today = new Date();
  const year = today.getFullYear();
  const month = String(today.getMonth() + 1).padStart(2, '0');
  const day = String(today.getDate()).padStart(2, '0');

  const todayKey = `${year}-${month}-${day}`;
  const startMonthKey = `${year}-${month}-01`;
  const endMonthDay = new Date(year, today.getMonth() + 1, 0).getDate();
  const endMonthKey = `${year}-${month}-${String(endMonthDay).padStart(2, '0')}`;

  let todayCount = 0, monthCount = 0, monthIncome = 0;

  const todayDoc = await db.collection(calendarCol()).doc(todayKey).get();
if (todayDoc.exists) {
  const data = todayDoc.data();
    Object.values(data).forEach(period => {
      if (period.status && period.status !== 'متاح') todayCount++;
    });
  }

  const snapshot = await db.collection(calendarCol())
    .where(firebase.firestore.FieldPath.documentId(), ">=", startMonthKey)
    .where(firebase.firestore.FieldPath.documentId(), "<=", endMonthKey)
    .get();

snapshot.forEach(doc => {
    const data = doc.data();
    Object.values(data).forEach(period => {
      if (period.status && period.status !== 'متاح') {
        monthCount++;
        monthIncome += Number(period.amount) || 0;
      }
    });
});


  const totalDays = endMonthDay * 4;
  const occupancyRate = ((monthCount / totalDays) * 100).toFixed(1);

  content.innerHTML = `

      </div>
    </div>

    <canvas id="myChart" style="max-width:500px;margin:auto;"></canvas>
  `;

  setTimeout(() => {

<script>
let currentProperty = localStorage.getItem('property') || 'chalet';

function calendarCol() {
  return (currentProperty === 'chalet') ? 'calendar2025' : 'calendar2025_apartment';
}


function expensesDocId(month) {
  return (currentProperty === 'chalet')
    ? `expenses-2025-${month}`              // يبقى القديم كما هو للشاليه
    : `expenses-2025-${month}-apartment`;   // نسخة منفصلة للشقة
}


function highlightPropertyButton() {
  document.querySelectorAll('.property-switch .prop-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  if (currentProperty === 'chalet') {
    document.querySelector('.property-switch .prop-btn:nth-child(1)').classList.add('active');
  } else {
    document.querySelector('.property-switch .prop-btn:nth-child(2)').classList.add('active');
  }
}


// تبديل وضع الحجز حسب العقار
function applyPropertyBookingMode() {
  const periodSelect = document.getElementById('periodSelect');
  const periodLabel = document.querySelector('label[for="periodSelect"]');
  const timePeriodInput = document.getElementById('timePeriod');
  const timePeriodLabel = document.getElementById('timePeriodLabel');

  if (!periodSelect) return;

  if (typeof currentProperty !== 'undefined' && currentProperty === 'apartment') {
    // الشقة: يوم كامل فقط
    periodSelect.value = 'fullDay';
    periodSelect.disabled = true;
    if (periodLabel) periodLabel.style.display = 'none';
    if (timePeriodInput) timePeriodInput.style.display = 'none';
    if (timePeriodLabel) timePeriodLabel.style.display = 'none';
    try { currentPeriod = 'fullDay'; } catch(e) {}
  } else {
    // الشاليه: كل الفترات متاحة
    periodSelect.disabled = false;
    if (periodLabel) periodLabel.style.display = '';
    // أظهر حقول الوقت حسب اختيار الفترة
    if (timePeriodInput && timePeriodLabel) {
      const show = (periodSelect.value === 'morning' || periodSelect.value === 'evening');
      timePeriodInput.style.display = show ? 'block' : 'none';
      timePeriodLabel.style.display = show ? 'block' : 'none';
    }
  }
}

function switchProperty(type) {
  if (type === currentProperty) return;
  currentProperty = type;
  localStorage.setItem('property', currentProperty);
  highlightPropertyButton();
  if (typeof buildCalendar === 'function') {
    buildCalendar();
updateLogos();       // 👈 لكي يتبدّل الشعار فوراً بعد التبديل

  }
}

// Ensure property buttons reflect stored property on load
document.addEventListener('DOMContentLoaded', () => {
  try{applyPropertyBookingMode();}catch(e){}
  highlightPropertyButton();
  buildCalendar();   // 👈 استدعاء أولي
});

</script>

<div class="popup" id="airbnbReminderPopup" style="max-width: 420px;">
  <button class="close-btn" onclick="closePopup('airbnbReminderPopup')">×</button>
  <h3>تذكير Airbnb</h3>
  <p id="airbnbReminderText" style="text-align:center; line-height:1.6;">
    الرجاء إغلاق هذا اليوم في حساب Airbnb لمنع الحجوزات المزدوجة.
  </p>
  <label style="display:flex; align-items:center; gap:8px; margin-top:10px;">
    <input type="checkbox" id="airbnbDontRemind">
    لا تذكرني لهذا اليوم
  </label>
  <div class="button-group">
    <button class="action" id="airbnbDoneBtn">✅ تم الإغلاق</button>
    <button class="action secondary" id="airbnbLaterBtn">لاحقًا</button>
  </div>
</div>
<script>
// ===== Airbnb Reminder =====
function showAirbnbReminder(dateKey) {
  try {
    if (localStorage.getItem('airbnb_suppressed_' + dateKey) === '1') return;

    var txt = document.getElementById('airbnbReminderText');
    if (txt) txt.innerHTML = 'الرجاء إغلاق هذا اليوم في حساب Airbnb:<br><strong>' + (dateKey || '') + '</strong>';

    var doneBtn = document.getElementById('airbnbDoneBtn');
    var laterBtn = document.getElementById('airbnbLaterBtn');
    var dontRemind = document.getElementById('airbnbDontRemind');

    if (doneBtn) {
      doneBtn.onclick = function() {
        if (dontRemind && dontRemind.checked) {
          localStorage.setItem('airbnb_suppressed_' + dateKey, '1');
        }
        if (typeof closePopup === 'function') closePopup('airbnbReminderPopup');
        if (typeof toast === 'function') toast('تذكير تمّ — لا تنس الإغلاق في Airbnb إن لم تفعل.', 'info');
      };
    }
    if (laterBtn) {
      laterBtn.onclick = function() {
        if (typeof closePopup === 'function') closePopup('airbnbReminderPopup');
      };
    }

    if (typeof showPopup === 'function') {
      showPopup('airbnbReminderPopup');
    } else {
      var el = document.getElementById('airbnbReminderPopup');
      if (el) el.style.display = 'block';
    }
  } catch (e) {
    console && console.warn && console.warn('Airbnb reminder error:', e);
  }
}

// Hook after saveBooking click to show reminder for apartment bookings
document.addEventListener('DOMContentLoaded', function() {
  var saveBtn = document.getElementById('saveBooking');
  if (!saveBtn) return;

  // Use capture to ensure our hook runs regardless of inner handlers
  saveBtn.addEventListener('click', function() {
    // Delay slightly to allow the original save to complete
    setTimeout(function() {
      try {
        // Try to detect date key
        var dateKey = (typeof currentDateKey !== 'undefined' && currentDateKey) ? currentDateKey : '';
        if (!dateKey) {
          var dateEl = document.getElementById('bookingDate') || document.getElementById('date') || document.querySelector('input[type="date"]');
          if (dateEl && dateEl.value) dateKey = dateEl.value;
        }
        if (!dateKey) {
          // Fallback to today
          dateKey = new Date().toISOString().slice(0,10);
        }

        // Detect property
        var propertyValue = (typeof currentProperty !== 'undefined' && currentProperty) ? currentProperty : '';
        if (!propertyValue) {
          var propEl = document.getElementById('property') || document.getElementById('propertySelect') || document.querySelector('[name="property"]');
          if (propEl && ('value' in propEl)) propertyValue = propEl.value;
        }

        // Detect status
        var statusValue = (typeof status !== 'undefined' && status) ? status : '';
        if (!statusValue) {
          var stEl = document.getElementById('status') || document.getElementById('bookingStatus') || document.querySelector('[name="status"]');
          if (stEl && ('value' in stEl)) statusValue = stEl.value;
        }

        // Normalize possible Arabic labels
        var isApartment = (propertyValue === 'apartment' || propertyValue === 'الشقة' || /apartment/i.test(propertyValue));
        var isBooked = (statusValue === 'محجوز' || statusValue === 'عربون' || /reserved|deposit/i.test(statusValue));

        if (isApartment && isBooked) {
          showAirbnbReminder(dateKey);
        }
      } catch (e) {
        console && console.warn && console.warn('Airbnb hook error:', e);
      }
    }, 700);
  }, { capture: true });
});
// ===== End Airbnb Reminder =====
</script>
